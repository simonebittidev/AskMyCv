apiVersion: apps/v1
kind: Deployment
metadata:
  name: askmycv
  labels:
    app: askmycv
spec:
  replicas: 1
  selector:
    matchLabels:
      app: askmycv
  template:
    metadata:
      labels:
        app: askmycv
    spec:
      containers:
      - name: askmycv
        image: simoneacr.azurecr.io/askmycv:__IMAGE_TAG__
        ports:
        - containerPort: 5005
        env:
        - name: AZURE_OPENAI_ENDPOINT
          value: "https://pocs-openai-simo.openai.azure.com/"
        - name: NEO4J_URI
          value: "neo4j+s://5e4610f3.databases.neo4j.io:7687"
        - name: NEO4J_USERNAME
          value: "neo4j"
        - name: LANGSMITH_TRACING
          value: "true"
        - name: LANGSMITH_PROJECT
          value: "pr-vacant-starter-88"
        - name: LANGSMITH_ENDPOINT
          value: "https://api.smith.langchain.com"
        - name: AZURE_OPENAI_DEPLOYMENT
          value: "gpt-5.4"
        - name: AZURE_OPENAI_API_VERSION
          value: "2024-12-01-preview"
        - name: AZURE_OPENAI_EMBEDDING_DEPLOYMENT
          value: "text-embedding-3-large"
        - name: AZURE_OPENAI_EMBEDDING_DIMENSIONS
          value: "3072"
        - name: GITHUB_USERNAME
          value: "simonebittidev"
        - name: AZURE_OPENAI_API_KEY
          valueFrom:
            secretKeyRef:
              name: askmycv-secrets
              key: AZURE_OPENAI_API_KEY
        - name: NEO4J_PASSWORD
          valueFrom:
            secretKeyRef:
              name: askmycv-secrets
              key: NEO4J_PASSWORD
        - name: LANGSMITH_API_KEY
          valueFrom:
            secretKeyRef:
              name: askmycv-secrets
              key: LANGSMITH_API_KEY
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: askmycv-secrets
              key: GITHUB_TOKEN
        resources:
          requests:
            memory: "1Gi"
            cpu: "250m"
          limits:
            memory: "3Gi"
            cpu: "1000m"
      imagePullSecrets:
        - name: acr-auth
