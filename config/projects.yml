# Curated list of GitHub projects that feed the knowledge graph.
# Each entry: { repo: "owner/name", branch?: "main", display_name?: "..." }
#
# Add or remove repos here — the next `python -m kg_builder` rebuild will
# pick up the changes. README content + repo metadata (stars, topics,
# language, last push) are fetched via the GitHub API.
#
# IMPORTANT: keep a SINGLE top-level `projects:` key. YAML treats a duplicate
# top-level key as an override, so the second list silently replaces the first.

projects:
  - repo: simonebittidev/ChatMyCv
    display_name: "ChatMyCv"

  - repo: simonebittidev/azure-devops-skillflow
    display_name: "Azure DevOps SkillFlow"

  # Example additional entry — uncomment/edit:
  # - repo: simonebittidev/<another-repo>
  #   branch: main
  #   display_name: "My Other Project"
